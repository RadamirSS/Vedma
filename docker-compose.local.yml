services:
  postgres:
    image: postgres:16-alpine
    container_name: vedma-postgres-local
    environment:
      POSTGRES_DB: bazhena
      POSTGRES_USER: bazhena
      POSTGRES_PASSWORD: bazhena_dev_password
    ports:
      - "5432:5432"
    volumes:
      - vedma_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  vedma_postgres_data:
